# Render Blueprint — despliegue del backend FastAPI.
# Docs: https://render.com/docs/blueprint-spec
# Importa este archivo desde el dashboard de Render (New > Blueprint).
services:
  - type: web
    name: ho-smartvision-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Rellena los valores secretos en el dashboard (sync: false los oculta).
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: GATEWAY_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://tu-panel.vercel.app
      - key: ENVIRONMENT
        value: production
