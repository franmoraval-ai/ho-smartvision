name: ho_smartvision
description: "Ho smartvision — app móvil para clientes (ver y gestionar cámaras CCTV)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Auth + datos (Supabase con RLS)
  supabase_flutter: ^2.8.0
  # Vista en vivo WebRTC/HLS servida por go2rtc
  webview_flutter: ^4.10.0
  # Llamadas al backend FastAPI (invitar usuarios)
  http: ^1.2.2
  # Formato de fechas
  intl: ^0.19.0
  # Notificaciones push nativas (Firebase Cloud Messaging)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
